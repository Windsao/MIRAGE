# Show-o2 smoke-test config — points Show-o2's `inference_mmu.py` at our cluster paths.
#
# Derived from Show-o-repo/show-o2/configs/showo2_1.5b_demo_432x432.yaml with:
#   - vae_model.pretrained_model_path -> existing Wan2.1 VAE on /nyx-storage1
#   - showo.pretrained_model_path -> our local Show-o2-1.5B download
#   - llm_model_path -> base Qwen2.5-1.5B-Instruct (loaded from HF cache)
#   - wandb -> offline (avoid network during smoke)
#
# Used by: scripts/phase1_0_smoke.sh

wandb:
  entity: null
  resume: 'auto'
  mode: 'offline'

experiment:
  project: "mirage"
  name: "showo2_smoke"
  output_dir: "/home/mzh1800/MIRAGE/logs/showo2_smoke"

model:
  weight_type: "bfloat16"
  vae_model:
    type: "wan21"
    pretrained_model_path: "/nyx-storage1/hanliu/world_model_ckpt/Wan-AI/Wan2.1-T2V-1.3B/Wan2.1_VAE.pth"

  showo:
    model_name: "Showo2"
    load_from_showo: True
    pretrained_model_path: "/nyx-storage1/hanliu/hf/models/show-o2-1.5B"
    llm_model_path: "Qwen/Qwen2.5-1.5B-Instruct"
    llm_vocab_size: null
    hidden_size: 1536
    image_latent_dim: 16
    image_latent_height: 27
    image_latent_width: 27
    video_latent_height: 27
    video_latent_width: 27
    patch_size: 2
    add_time_embeds: True
    num_und_trans_layers: 8
    num_refiner_layers: 10
    clip_latent_dim: 1152
    add_qk_norm: True
    clip_pretrained_model_path: "google/siglip-so400m-patch14-384"

dataset:
  params:
    validation_prompts_file: "prompts/t2i_prompts.txt"
  preprocessing:
    max_seq_length: 1024
    resolution: 432
    num_t2i_image_tokens: 729
    num_mmu_image_tokens: 729
    num_video_tokens: 3645
    latent_height: ${model.showo.image_latent_height}
    latent_width: ${model.showo.image_latent_width}
    video_latent_height: ${model.showo.video_latent_height}
    video_latent_width: ${model.showo.video_latent_width}

transport:
  path_type: "Linear"
  prediction: "velocity"
  loss_weight: null
  train_eps: null
  sample_eps: null
  snr_type: "lognorm"
  sampling_method: "euler"
  guidance_scale: 5.0
  num_inference_steps: 50
  atol: 1e-6
  rtol: 1e-3
  reverse: False
  do_shift: True
  time_shifting_factor: 3.0
